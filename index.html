<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工数打刻">
<meta name="theme-color" content="#12161B">
<title>工数タイムレコーダー</title>
<!--
  ver.1.6.0 (2026-07-16): 初期PJ一覧を「プロジェクトA・プロジェクトB・共通/量産・脱属人化/標準化」に変更。初期業務分類を11区分（本業務／会議・打合せ／資料作成／管理・マネジメント／教育・移譲・自己啓発／改善活動／トラブル対応・手戻り・待ち／折衝・調整／メール対応／移動／トランスクリプト収集・議事録作成）に刷新し、価値区分を紐づけ
-->
<style>
  :root{
    --bg:#12161B;
    --panel:#1B222A;
    --panel-2:#232C36;
    --line:#2E3944;
    --txt:#E6EDF3;
    --mute:#7D8894;
    --amber:#FFB020;
    --rec:#E5484D;
    --ok:#3FB68B;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--sans);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 88px) env(safe-area-inset-left);
    min-height:100vh;font-size:15px;line-height:1.5;
  }
  .wrap{max-width:520px;margin:0 auto;padding:12px 14px 24px;}

  /* ── 打刻機ヘッド ── */
  .head{
    background:linear-gradient(180deg,#232C36,#1A2129);
    border:1px solid var(--line);border-radius:14px;
    padding:14px 16px 16px;position:relative;overflow:hidden;
  }
  .head::before{
    content:"";position:absolute;inset:0 0 auto 0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,176,32,.5),transparent);
  }
  .clockrow{display:flex;align-items:baseline;justify-content:space-between;}
  .clock{font-family:var(--mono);font-size:15px;color:var(--mute);letter-spacing:.04em;font-variant-numeric:tabular-nums;}
  .badge{font-size:11px;color:var(--mute);letter-spacing:.12em;text-transform:uppercase;}

  .display{
    margin-top:10px;text-align:center;
  }
  .elapsed{
    font-family:var(--mono);font-weight:600;
    font-size:clamp(44px,15vw,62px);line-height:1.05;
    color:var(--amber);font-variant-numeric:tabular-nums;
    letter-spacing:.02em;
    text-shadow:0 0 22px rgba(255,176,32,.28);
  }
  .elapsed.idle{color:#3D4855;text-shadow:none;}
  .elapsed.over{color:var(--rec);text-shadow:0 0 22px rgba(229,72,77,.35);}
  .runbanner{
    display:flex;align-items:center;gap:8px;
    margin-top:12px;padding:10px 12px;border-radius:10px;
    background:rgba(229,72,77,.14);border:1px solid rgba(229,72,77,.5);
    color:#F0B4B6;font-size:13px;line-height:1.4;
  }
  .runbanner .rb-icon{font-size:15px;flex:0 0 auto;}
  .nowitem{
    margin-top:4px;font-size:14px;color:var(--txt);min-height:22px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .nowitem .pj{color:var(--mute);}
  .recdot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:var(--rec);margin-right:6px;vertical-align:middle;
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  @media (prefers-reduced-motion:reduce){.recdot{animation:none}}

  /* ── 大ボタン ── */
  .bigbtn{
    display:block;width:100%;margin-top:14px;
    border:none;border-radius:12px;padding:16px;
    font-size:17px;font-weight:700;letter-spacing:.06em;
    font-family:var(--sans);cursor:pointer;
  }
  .bigbtn.stop{background:var(--rec);color:#fff;box-shadow:0 4px 0 #A6262A;}
  .bigbtn.stop:active{transform:translateY(3px);box-shadow:0 1px 0 #A6262A;}

  /* ── セクション ── */
  h2{
    font-size:11px;color:var(--mute);letter-spacing:.14em;
    text-transform:uppercase;margin:22px 0 8px;font-weight:600;
    display:flex;align-items:center;gap:8px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ── クイック打刻 ── */
  .quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .qbtn{
    position:relative;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:12px 34px 12px 12px;text-align:left;cursor:pointer;color:var(--txt);
    font-family:var(--sans);min-height:64px;
    display:flex;flex-direction:column;justify-content:center;gap:2px;
  }
  .qbtn:active{background:var(--panel-2);transform:scale(.98);}
  .qbtn .cat{font-size:15px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .qbtn .pj{font-size:11px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .qbtn .star{
    position:absolute;top:6px;right:6px;width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#4C5967;border-radius:8px;
  }
  .qbtn .star.on{color:var(--amber);}
  .qbtn .star:active{background:var(--panel-2);}
  .qbtn.add{align-items:center;justify-content:center;color:var(--amber);border-style:dashed;font-size:22px;padding:12px;}

  /* ── 実績リスト ── */
  .entry{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px;margin-bottom:8px;
  }
  .entry .time{font-family:var(--mono);font-size:12px;color:var(--mute);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .entry .body{flex:1;min-width:0;}
  .entry .t1{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry .t2{font-size:11px;color:var(--mute);margin-top:2px;}
  .entry .dur{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--amber);font-variant-numeric:tabular-nums;}
  .entry.sent{opacity:.5;}
  .entry.sent .dur{color:var(--ok);}
  /* 実績行の操作ボタン（大きめ・タップしやすく） */
  .rowbtn{
    flex:0 0 auto;width:42px;height:42px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);background:var(--panel-2);cursor:pointer;padding:0;
  }
  .rowbtn svg{width:20px;height:20px;}
  .rowbtn.send{background:var(--amber);border-color:var(--amber);}
  .rowbtn.send svg{stroke:#12161B;}
  .rowbtn.send:active{transform:scale(.94);}
  .rowbtn.trash svg{stroke:#5A6673;}
  .rowbtn.trash:active{background:#3A2226;}
  .sentmark{
    flex:0 0 auto;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    color:var(--ok);
  }
  .sentmark svg{width:20px;height:20px;stroke:var(--ok);}
  .vtag{
    display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;margin-right:5px;
    border:1px solid currentColor;
  }
  .v-add{color:var(--ok);}
  .v-keep{color:#6E9CD2;}
  .v-waste{color:#C97A9E;}

  .empty{color:#4C5967;font-size:13px;text-align:center;padding:20px 0;}

  /* ── 集計 ── */
  .sum{display:flex;gap:6px;margin-top:10px;}
  .sumcell{
    flex:1;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:8px 6px;text-align:center;
  }
  .sumcell .k{font-size:10px;color:var(--mute);}
  .sumcell .v{font-family:var(--mono);font-size:17px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums;}

  /* ── 転送バー（固定） ── */
  .dock{
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(18,22,27,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  }
  .dock-inner{max-width:520px;margin:0 auto;display:flex;gap:8px;}
  .send{
    flex:1;background:var(--amber);color:#12161B;border:none;border-radius:13px;
    padding:17px;font-size:16px;font-weight:700;font-family:var(--sans);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .send svg{width:20px;height:20px;stroke:#12161B;}
  .send:disabled{background:#2E3944;color:#5A6673;}
  .send:disabled svg{stroke:#5A6673;}
  .send:active:not(:disabled){transform:scale(.98);}
  .icon-btn{
    width:58px;background:var(--panel);border:1px solid var(--line);
    border-radius:13px;color:var(--txt);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:active{background:var(--panel-2);}
  .dockbtn{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:13px;padding:17px;font-size:16px;font-weight:600;
    font-family:var(--sans);cursor:pointer;
  }
  .dockbtn:active{background:var(--panel-2);}

  /* ── シート ── */
  .sheet{
    position:fixed;inset:0;background:rgba(8,10,13,.7);
    display:none;align-items:flex-end;z-index:50;
  }
  .sheet.on{display:flex;}
  .sheet-in{
    width:100%;max-height:88vh;overflow-y:auto;
    background:var(--bg);border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;padding:16px 16px calc(24px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  .grip{width:36px;height:4px;border-radius:2px;background:#3A4653;margin:0 auto 14px;}
  .sheet h3{margin:0 0 12px;font-size:16px;}
  .confirm-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px;text-align:center;
  }
  .confirm-card .cc-pj{font-size:14px;color:var(--mute);margin-bottom:4px;}
  .confirm-card .cc-cat{font-size:19px;font-weight:700;margin-bottom:10px;}
  .confirm-card .cc-time{font-family:var(--mono);font-size:15px;color:var(--txt);}
  .confirm-card .cc-time b{color:var(--amber);}
  .opt{
    display:block;width:100%;text-align:left;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:16px;
    color:var(--txt);font-size:16px;font-family:var(--sans);margin-bottom:8px;cursor:pointer;
  }
  .opt:active{background:var(--panel-2);}
  .opt .sub{font-size:11px;color:var(--mute);margin-top:2px;}
  .closebtn{
    width:100%;background:var(--panel-2);border:1px solid #3E4A57;border-radius:12px;
    padding:15px;color:var(--txt);font-size:16px;font-weight:600;margin-top:12px;
    font-family:var(--sans);cursor:pointer;
  }
  .closebtn:active{background:#2B343E;}
  .closebtn.done{background:var(--amber);color:#12161B;border-color:var(--amber);}
  input[type=text],select,input[type=datetime-local]{
    width:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:13px;color:var(--txt);font-size:16px;
    font-family:var(--sans);margin-bottom:8px;
  }
  .row2{display:flex;gap:8px;}
  .row2>*{flex:1;}
  .mini{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);padding:13px 14px;font-size:15px;font-family:var(--sans);cursor:pointer;
  }
  .mini.pri{background:var(--amber);color:#12161B;border-color:var(--amber);font-weight:700;}
  .mini.dan{color:var(--rec);}
  .listrow{
    display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:5px;
  }
  .listrow .nm{flex:1;font-size:14px;}
  .note{font-size:12px;color:var(--mute);line-height:1.6;margin:10px 0;}

  .toast{
    position:fixed;left:50%;bottom:104px;transform:translateX(-50%);
    background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    padding:10px 18px;border-radius:20px;font-size:13px;z-index:99;
    opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.on{opacity:1;}
  .ver{text-align:center;color:#39434E;font-size:11px;font-family:var(--mono);margin-top:20px;}
  .warn{
    background:rgba(229,72,77,.12);border:1px solid rgba(229,72,77,.4);
    border-radius:10px;padding:10px 12px;margin-bottom:12px;
    font-size:12px;line-height:1.6;color:#F0B4B6;
  }
  .warn b{color:#FF9A9D;}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">

  <div id="warn"></div>

  <div class="head">
    <div class="clockrow">
      <span class="clock" id="clock">--:--:--</span>
      <span class="badge" id="state">待機中</span>
    </div>
    <div class="display">
      <div class="elapsed idle" id="elapsed">0:00:00</div>
      <div class="nowitem" id="nowitem">項目を選んで打刻を開始</div>
    </div>
    <div class="runbanner" id="runBanner" style="display:none">
      <span class="rb-icon">⚠</span><span class="rb-txt"></span>
    </div>
    <button class="bigbtn stop" id="stopBtn" style="display:none">■ ストップ</button>
  </div>

  <h2>クイック打刻</h2>
  <div class="quick" id="quick"></div>

  <h2>今日の実績</h2>
  <div id="entries"></div>
  <div class="sum" id="sum"></div>

  <div class="ver">ver.1.6.0</div>
</div>

<div class="dock">
  <div class="dock-inner">
    <button class="dockbtn" id="monthBtn">📊　月次分析・出力</button>
    <button class="icon-btn" id="cfgBtn" title="設定">⚙</button>
  </div>
</div>

<div class="sheet" id="sheet"><div class="sheet-in" id="sheetIn"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════ ストレージ ═══════ */
const KEY='kosu_v1';
let mem=null;
function load(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return mem||null;
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){mem=JSON.parse(JSON.stringify(S));}
}

/* ═══════ 初期データ ═══════ */
const DEFAULT={
  projects:['プロジェクトA','プロジェクトB','共通/量産','脱属人化/標準化'],
  cats:[
    {n:'本業務(設計・検討・TRY・立合・確認)',v:'add'},
    {n:'会議・打合せ',v:'keep'},
    {n:'資料作成',v:'add'},
    {n:'管理・マネジメント',v:'keep'},
    {n:'教育・移譲・自己啓発',v:'add'},
    {n:'改善活動',v:'keep'},
    {n:'トラブル対応・手戻り・待ち',v:'waste'},
    {n:'折衝・調整',v:'keep'},
    {n:'メール対応',v:'keep'},
    {n:'移動',v:'waste'},
    {n:'トランスクリプト収集・議事録作成',v:'add'}
  ],
  entries:[],
  running:null,
  mode:'ics',
  favs:[],
  alertMin:60
};
let S=load()||JSON.parse(JSON.stringify(DEFAULT));
if(!S.projects) S=JSON.parse(JSON.stringify(DEFAULT));
if(!S.mode) S.mode='outlook';
S.mode='outlook'; // 転送はOutlook直リンクに固定（標準カレンダー方式は廃止）
if(!S.favs) S.favs=[];
if(typeof S.alertMin!=='number') S.alertMin=60;

const VLABEL={add:'付加価値',keep:'維持管理',waste:'ムダ'};
const VCLASS={add:'v-add',keep:'v-keep',waste:'v-waste'};

/* ═══════ ユーティリティ ═══════ */
const pad=n=>String(n).padStart(2,'0');
const hm=t=>{const d=new Date(t);return pad(d.getHours())+':'+pad(d.getMinutes());};
const dkey=t=>{const d=new Date(t);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
function dur(ms){
  const s=Math.floor(ms/1000);
  return Math.floor(s/3600)+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60);
}
function hhmm(ms){
  const m=Math.round(ms/60000);
  return Math.floor(m/60)+'h'+pad(m%60);
}
function catOf(name){return S.cats.find(c=>c.n===name)||{n:name,v:'keep'};}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1900);
}

/* ═══════ 時計・タイマー ═══════ */
let _alerted=false; // この計測で警告済みか
setInterval(()=>{
  const d=new Date();
  document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  if(S.running){
    const ms=Date.now()-S.running.start;
    const el=document.getElementById('elapsed');
    el.textContent=dur(ms);
    // 長時間計測の検知
    const overMs=(S.alertMin||60)*60000;
    if(ms>=overMs){
      el.classList.add('over');          // 数字を警告色に
      showRunBanner(true);               // 「まだ計測中」バナー
      if(!_alerted){                     // 初回だけバイブ
        _alerted=true;
        if(navigator.vibrate) navigator.vibrate([80,60,80,60,80]);
      }
    }else{
      el.classList.remove('over');
      showRunBanner(false);
    }
  }
},1000);

// 「まだ計測中」バナーの表示切替
function showRunBanner(on){
  const b=document.getElementById('runBanner');
  if(!b) return;
  if(on && S.running){
    const mins=Math.floor((Date.now()-S.running.start)/60000);
    b.querySelector('.rb-txt').textContent='計測が'+mins+'分続いています。ストップ忘れに注意';
    b.style.display='flex';
  }else{
    b.style.display='none';
  }
}

/* アプリを開いた/前面に戻した時の長時間チェック（主軸：確実に動く） */
function checkStaleOnResume(){
  if(!S.running) return;
  const ms=Date.now()-S.running.start;
  const overMs=(S.alertMin||60)*60000;
  if(ms>=overMs){
    staleSheet();
  }
}
function staleSheet(){
  if(!S.running) return;
  const r=S.running;
  const mins=Math.floor((Date.now()-r.start)/60000);
  const h=Math.floor(mins/60), m=mins%60;
  const dispDur=(h>0?h+'時間':'')+m+'分';
  let html='<h3>⚠ 長時間の計測が続いています</h3>';
  html+='<div class="confirm-card" style="border-color:var(--rec)">'+
     '<div class="cc-cat" style="color:var(--rec)">'+dispDur+' 計測中</div>'+
     '<div class="cc-pj">'+esc(r.cat)+' ／ '+esc(r.pj)+'</div>'+
     '<div class="cc-time">開始 '+hm(r.start)+'</div>'+
     '</div>';
  html+='<button class="closebtn done" style="margin-top:14px" onclick="stopNow()">今すぐストップする</button>';
  html+='<button class="closebtn" onclick="stopAtTime()">別の時刻でストップ（止め忘れ）</button>';
  html+='<button class="closebtn" onclick="closeSheet()">まだ続けている</button>';
  openSheet(html);
}
// 今すぐストップ（通常のストップと同じ→確認シートへ）
function stopNow(){ closeSheet(); stop(false); }
// 実際に終わった時刻を入れて締める
function stopAtTime(){
  if(!S.running){ closeSheet(); return; }
  const r=S.running;
  const iso=t=>{const d=new Date(t);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());};
  let html='<h3>終了時刻を入力</h3>';
  html+='<div class="note">実際に作業を終えた時刻を入れてください。その時刻で記録します。</div>';
  html+='<div class="note">開始: '+hm(r.start)+'</div>';
  html+='<input type="datetime-local" id="stEnd" value="'+iso(Date.now())+'">';
  html+='<div class="row2"><button class="mini" onclick="staleSheet()">戻る</button>'+
        '<button class="mini pri" onclick="applyStopAt()">この時刻で記録</button></div>';
  openSheet(html);
}
function applyStopAt(){
  if(!S.running){ closeSheet(); return; }
  const r=S.running;
  const en=new Date(document.getElementById('stEnd').value).getTime();
  if(isNaN(en)||en<=r.start){ toast('開始より後の時刻を入れてください'); return; }
  const newId='e'+en+Math.random().toString(36).slice(2,6);
  S.entries.push({id:newId,pj:r.pj,cat:r.cat,start:r.start,end:en,sent:false});
  S.running=null;_alerted=false;save();render();
  confirmSheet(newId); // そのまま送信確認へ
}

// 復帰時チェックを登録
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) checkStaleOnResume(); });
window.addEventListener('focus',checkStaleOnResume);
window.addEventListener('pageshow',checkStaleOnResume);

/* ═══════ 描画 ═══════ */
function render(){
  const el=document.getElementById('elapsed');
  const ni=document.getElementById('nowitem');
  const st=document.getElementById('state');
  const sb=document.getElementById('stopBtn');

  if(S.running){
    el.classList.remove('idle');
    el.textContent=dur(Date.now()-S.running.start);
    ni.innerHTML='<span class="recdot"></span>'+esc(S.running.cat)+' <span class="pj">／ '+esc(S.running.pj)+'</span>';
    st.textContent='計測中';st.style.color='var(--rec)';
    sb.style.display='block';
  }else{
    el.classList.add('idle');el.textContent='0:00:00';
    ni.textContent='項目を選んで打刻を開始';
    st.textContent='待機中';st.style.color='';
    sb.style.display='none';
  }

  // クイックボタン（★お気に入り固定 → 頻度順 で最大9件）
  const SEP='\u0001';
  const favs=(S.favs||[]).slice();               // 固定（順序保持）
  const freq={};
  S.entries.slice(-80).forEach(e=>{const k=e.pj+SEP+e.cat;freq[k]=(freq[k]||0)+1;});
  // 頻度順（★は除外して重複回避）
  const byFreq=Object.keys(freq).filter(k=>!favs.includes(k)).sort((a,b)=>freq[b]-freq[a]);
  let keys=favs.concat(byFreq).slice(0,9);
  if(keys.length===0){
    keys=[S.projects[0]+SEP+S.cats[0].n, S.projects[0]+SEP+(S.cats[2]?S.cats[2].n:S.cats[0].n)];
  }
  const q=document.getElementById('quick');
  q.innerHTML='';
  keys.forEach(k=>{
    const [pj,cat]=k.split(SEP);
    const isFav=favs.includes(k);
    const b=document.createElement('button');
    b.className='qbtn';
    b.innerHTML='<span class="cat">'+esc(cat)+'</span><span class="pj">'+esc(pj)+'</span>'+
      '<span class="star'+(isFav?' on':'')+'" role="button" aria-label="お気に入り固定">'+(isFav?'★':'☆')+'</span>';
    b.onclick=()=>start(pj,cat);
    const star=b.querySelector('.star');
    star.onclick=(ev)=>{ev.stopPropagation();toggleFav(k);};
    q.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='qbtn add';add.textContent='＋';
  add.setAttribute('aria-label','項目を選んで開始');
  add.onclick=pickProject;
  q.appendChild(add);

  // 今日の実績
  const today=dkey(Date.now());
  const list=S.entries.filter(e=>dkey(e.start)===today).sort((a,b)=>b.start-a.start);
  const box=document.getElementById('entries');
  box.innerHTML='';
  if(list.length===0){
    box.innerHTML='<div class="empty">まだ記録がありません</div>';
  }
  list.forEach(e=>{
    const c=catOf(e.cat);
    const d=document.createElement('div');
    d.className='entry'+(e.sent?' sent':'');
    d.innerHTML=
      '<span class="time">'+hm(e.start)+'<br>'+hm(e.end)+'</span>'+
      '<span class="body"><span class="t1">'+esc(e.pj)+'</span>'+
      '<span class="t2"><span class="vtag '+VCLASS[c.v]+'">'+VLABEL[c.v]+'</span>'+esc(e.cat)+'</span></span>'+
      '<span class="dur">'+hhmm(e.end-e.start)+'</span>';
    let snd=null;
    if(!e.sent){
      snd=document.createElement('button');
      snd.className='rowbtn send';
      snd.setAttribute('aria-label','この記録をOutlookへ追加');
      snd.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m2 7 10 6 10-6"></path></svg>';
      snd.onclick=(ev)=>{ev.stopPropagation();sendOne(e.id);};
      d.appendChild(snd);
    }else{
      const mk=document.createElement('span');
      mk.className='sentmark';mk.title='転送済';
      mk.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>';
      d.appendChild(mk);
    }
    const del=document.createElement('button');
    del.className='rowbtn trash';del.setAttribute('aria-label','削除');
    del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V6"></path></svg>';
    del.onclick=(ev)=>{ ev.stopPropagation(); if(confirm('この記録を削除しますか？')){S.entries=S.entries.filter(x=>x.id!==e.id);save();render();} };
    d.appendChild(del);
    d.onclick=ev=>{ if(ev.target===d || (ev.target.closest && ev.target.closest('.body,.time,.dur'))) editEntry(e.id); };
    box.appendChild(d);
  });

  // 集計
  const tot={add:0,keep:0,waste:0};
  list.forEach(e=>{tot[catOf(e.cat).v]+=e.end-e.start;});
  const all=tot.add+tot.keep+tot.waste;
  const rate=all>0?Math.round(tot.add/all*100):0;
  document.getElementById('sum').innerHTML=
    cell('合計',hhmm(all))+
    cell('付加価値',hhmm(tot.add))+
    cell('維持管理',hhmm(tot.keep))+
    cell('ムダ',hhmm(tot.waste))+
    cell('VH率',rate+'%');

  save();
}
function cell(k,v){return '<div class="sumcell"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ═══════ 打刻 ═══════ */
function toggleFav(k){
  if(!S.favs) S.favs=[];
  const i=S.favs.indexOf(k);
  if(i>=0){ S.favs.splice(i,1); toast('固定を解除しました'); }
  else{
    if(S.favs.length>=9){ toast('固定は最大9件までです'); return; }
    S.favs.push(k); toast('★ 固定しました');
  }
  save();render();
}
function start(pj,cat){
  if(S.running){ if(!confirm('計測中の「'+S.running.cat+'」を終了して切り替えますか？')) return; stop(true); }
  S.running={pj,cat,start:Date.now()};
  _alerted=false;
  save();render();
  if(navigator.vibrate) navigator.vibrate(12);
  toast('▶ '+cat+' 開始');
}
function stop(silent){
  if(!S.running) return;
  const r=S.running,end=Date.now();
  let newId=null;
  if(end-r.start>=30000){
    newId='e'+end+Math.random().toString(36).slice(2,6);
    S.entries.push({id:newId,pj:r.pj,cat:r.cat,start:r.start,end,sent:false});
  }else if(!silent){
    toast('30秒未満のため記録しません');
  }
  S.running=null;save();render();
  _alerted=false;
  if(navigator.vibrate) navigator.vibrate([12,60,12]);
  // 切替(silent)でなく、記録できたときは確認シートを出す
  if(!silent && newId){ confirmSheet(newId); }
}
document.getElementById('stopBtn').onclick=()=>stop(false);

/* ストップ直後の確認シート（修正 or Outlookへ送信） */
function confirmSheet(id){
  const e=S.entries.find(x=>x.id===id);
  if(!e) return;
  const c=catOf(e.cat);
  let h='<h3>この内容で記録します</h3>';
  h+='<div class="confirm-card">'+
     '<div class="cc-pj">'+esc(e.pj)+'</div>'+
     '<div class="cc-cat"><span class="vtag '+VCLASS[c.v]+'">'+VLABEL[c.v]+'</span>'+esc(e.cat)+'</div>'+
     '<div class="cc-time">'+hm(e.start)+' → '+hm(e.end)+' 　<b>'+hhmm(e.end-e.start)+'</b></div>'+
     '</div>';
  h+='<button class="closebtn done" style="margin-top:14px" onclick="sendFromConfirm(\''+id+'\')">Outlookへ送信 →</button>';
  h+='<div class="row2" style="margin-top:8px">'+
     '<button class="mini" onclick="editEntry(\''+id+'\',true)">修正する</button>'+
     '<button class="mini" onclick="closeSheet()">あとで送る</button></div>';
  openSheet(h);
}
function sendFromConfirm(id){
  const e=S.entries.find(x=>x.id===id);
  if(!e) return;
  closeSheet();
  sendToCalendar([e]);
}

/* ═══════ シート ═══════ */
const sheet=document.getElementById('sheet'),sheetIn=document.getElementById('sheetIn');
function openSheet(html){sheetIn.innerHTML='<div class="grip"></div>'+html;sheet.classList.add('on');}
function closeSheet(){sheet.classList.remove('on');}
sheet.onclick=e=>{if(e.target===sheet)closeSheet();};

function pickProject(){
  let h='<h3>PJを選択</h3>';
  S.projects.forEach((p,i)=>h+='<button class="opt" onclick="pickCat('+i+')">'+esc(p)+'</button>');
  h+='<button class="closebtn" onclick="closeSheet()">キャンセル</button>';
  openSheet(h);
}
function pickCat(pi){
  const pj=S.projects[pi];
  let h='<h3>'+esc(pj)+'</h3>';
  S.cats.forEach((c,i)=>h+='<button class="opt" onclick="startFrom('+pi+','+i+')">'+esc(c.n)+
    '<div class="sub"><span class="vtag '+VCLASS[c.v]+'">'+VLABEL[c.v]+'</span></div></button>');

  openSheet(h);
}
function startFrom(pi,ci){closeSheet();start(S.projects[pi],S.cats[ci].n);}

/* ═══════ 実績の編集 ═══════ */
function editEntry(id,fromConfirm){
  const e=S.entries.find(x=>x.id===id);if(!e)return;
  const iso=t=>{const d=new Date(t);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());};
  let h='<h3>記録を修正</h3>';
  h+='<select id="ePj">'+S.projects.map(p=>'<option'+(p===e.pj?' selected':'')+'>'+esc(p)+'</option>').join('')+'</select>';
  h+='<select id="eCat">'+S.cats.map(c=>'<option'+(c.n===e.cat?' selected':'')+'>'+esc(c.n)+'</option>').join('')+'</select>';
  h+='<div class="row2"><input type="datetime-local" id="eS" value="'+iso(e.start)+'"><input type="datetime-local" id="eE" value="'+iso(e.end)+'"></div>';
  if(e.sent) h+='<div class="note">この記録は転送済みです。修正すると未転送に戻り、再度カレンダーに追加できます（重複にご注意ください）。</div>';
  const backArg=fromConfirm?',true':'';
  h+='<div class="row2"><button class="mini" onclick="'+(fromConfirm?'confirmSheet(\''+id+'\')':'closeSheet()')+'">戻る</button>'+
     '<button class="mini pri" onclick="saveEntry(\''+id+'\''+backArg+')">保存</button></div>';
  openSheet(h);
}
function saveEntry(id,fromConfirm){
  const e=S.entries.find(x=>x.id===id);if(!e)return;
  const s=new Date(document.getElementById('eS').value).getTime();
  const en=new Date(document.getElementById('eE').value).getTime();
  if(isNaN(s)||isNaN(en)||en<=s){toast('時刻が不正です');return;}
  e.pj=document.getElementById('ePj').value;
  e.cat=document.getElementById('eCat').value;
  e.start=s;e.end=en;e.sent=false;
  save();render();toast('修正しました');
  if(fromConfirm){ confirmSheet(id); } else { closeSheet(); }
}

/* ═══════ カレンダー転送（.ics） ═══════ */
function icsTime(t){
  const d=new Date(t);
  return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+
         pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+'Z';
}
function fold(s){ // RFC5545 75オクテット折返し（簡易）
  return s.length<=74?s:s.match(/.{1,74}/g).join('\r\n ');
}
/* 予定の件名。先頭に選別キーワード #kosu を付与（Outlookエクスポート時に件名だけで抽出できる） */
function subjectOf(e){
  return '#kosu ['+e.pj+']['+e.cat+']';
}
/* 分析用の機械可読タグ行。後でCSV/正規表現で確実に拾える形 */
function tagLine(e){
  const c=catOf(e.cat);
  const min=Math.round((e.end-e.start)/60000);
  return '#kosu PJ=['+e.pj+'] 分類=['+e.cat+'] 価値=['+VLABEL[c.v]+'] 分=['+min+']';
}
/* 人が読む本文（1行目）＋機械可読行（2行目） */
function bodyLines(e){
  const c=catOf(e.cat);
  return ['PJ: '+e.pj+' ／ 分類: '+e.cat+' ／ 価値区分: '+VLABEL[c.v]+' ／ 工数: '+hhmm(e.end-e.start),
          tagLine(e)];
}
function buildIcs(list){
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//kosu-timecard//JP\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
  list.forEach(e=>{
    const c=catOf(e.cat);
    const desc=bodyLines(e).join('\\n');
    ics+='BEGIN:VEVENT\r\n'
      +'UID:'+e.id+'@kosu-timecard\r\n'
      +'DTSTAMP:'+icsTime(Date.now())+'\r\n'
      +'DTSTART:'+icsTime(e.start)+'\r\n'
      +'DTEND:'+icsTime(e.end)+'\r\n'
      +fold('SUMMARY:'+subjectOf(e))+'\r\n'
      +fold('DESCRIPTION:'+desc)+'\r\n'
      +'CATEGORIES:'+VLABEL[c.v]+'\r\n'
      +'TRANSP:OPAQUE\r\n'
      +'END:VEVENT\r\n';
  });
  return ics+'END:VCALENDAR\r\n';
}

/* 環境判定 */
const CAN_SHARE=(()=>{ try{ return !!(navigator.canShare && navigator.canShare({files:[new File([''],'t.ics',{type:'text/calendar'})]})); }catch(e){ return false; } })();
function showWarn(){
  const w=document.getElementById('warn');
  if(S.mode==='outlook' || CAN_SHARE){ w.innerHTML=''; return; }
  w.innerHTML='<div class="warn"><b>この環境ではカレンダー転送できません。</b><br>'+
    'アプリ内ブラウザやプレビューでは共有シートがブロックされます。<b>Safariで開き直す</b>か、'+
    '設定（⚙）で転送方法を<b>「Outlook直リンク」</b>に切り替えてください。</div>';
}

/* ── 方式A: .ics を共有シートで標準カレンダーへ ── */
async function shareIcs(list){
  if(!CAN_SHARE){
    toast('この環境では共有できません。設定を確認してください');
    return false;
  }
  const ics=buildIcs(list);
  const name='kosu_'+dkey(Date.now())+'.ics';
  const file=new File([ics],name,{type:'text/calendar'});
  try{
    await navigator.share({files:[file]});
    return true;
  }catch(err){
    if(err && err.name==='AbortError'){ toast('キャンセルしました'); return false; }
    toast('共有に失敗しました（'+((err&&err.name)||'不明')+'）');
    return false;
  }
}

/* ── 方式B: Outlook Web の予定作成画面を直接開く ── */
function tzOffset(t){
  const o=-new Date(t).getTimezoneOffset();
  return (o>=0?'+':'-')+pad(Math.floor(Math.abs(o)/60))+':'+pad(Math.abs(o)%60);
}
function localIso(t){
  const d=new Date(t);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+
         pad(d.getHours())+':'+pad(d.getMinutes())+':00'+tzOffset(t);
}
function outlookUrl(e){
  const p=new URLSearchParams({
    path:'/calendar/action/compose',
    rru:'addevent',
    subject:subjectOf(e),
    startdt:localIso(e.start),
    enddt:localIso(e.end),
    body:bodyLines(e).join('\n')
  });
  return 'https://outlook.office.com/calendar/0/deeplink/compose?'+p.toString();
}

/* ── 転送の入口 ── */
async function sendToCalendar(list){
  if(list.length===0) return;
  if(S.mode==='outlook'){
    const e=list.slice().sort((a,b)=>a.start-b.start)[0];
    const rest=list.length-1;
    e.sent=true;save();render();
    if(rest>0) toast('残り'+rest+'件。戻ってもう一度押してください');
    location.href=outlookUrl(e);
    return;
  }
  const ok=await shareIcs(list);
  if(!ok){ render(); return; }
  list.forEach(e=>e.sent=true);
  save();render();
  toast(list.length+'件をカレンダーへ送りました');
}
function sendOne(id){
  const e=S.entries.find(x=>x.id===id);
  if(e) sendToCalendar([e]);
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}

/* ═══════ 月次出力・分析 ═══════ */
function monthKey(t){const d=new Date(t);return d.getFullYear()+'-'+pad(d.getMonth()+1);}
function csvCell(s){return '"'+String(s).replace(/"/g,'""')+'"';}

function monthlyEntries(mk){
  return S.entries.filter(e=>monthKey(e.start)===mk).sort((a,b)=>a.start-b.start);
}

function exportCsv(mk){
  const list=monthlyEntries(mk);
  if(list.length===0){toast('この月の記録がありません');return;}
  let csv='\ufeff日付,曜日,開始,終了,分,PJ,業務分類,価値区分\r\n';
  const wd=['日','月','火','水','木','金','土'];
  list.forEach(e=>{
    csv+=[dkey(e.start),wd[new Date(e.start).getDay()],hm(e.start),hm(e.end),
      Math.round((e.end-e.start)/60000),csvCell(e.pj),csvCell(e.cat),VLABEL[catOf(e.cat).v]].join(',')+'\r\n';
  });
  downloadBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),'kosu_'+mk+'.csv');
  toast(mk+' のCSVを書き出しました');
}

function exportMd(mk){
  const list=monthlyEntries(mk);
  if(list.length===0){toast('この月の記録がありません');return;}
  const total=list.reduce((s,e)=>s+(e.end-e.start),0);
  // 集計
  const byV={add:0,keep:0,waste:0};
  const byPj={},byCat={};
  list.forEach(e=>{
    const ms=e.end-e.start,c=catOf(e.cat);
    byV[c.v]+=ms;
    byPj[e.pj]=(byPj[e.pj]||0)+ms;
    byCat[e.cat]=(byCat[e.cat]||0)+ms;
  });
  const pct=ms=>total>0?Math.round(ms/total*100):0;
  const sortDesc=o=>Object.keys(o).sort((a,b)=>o[b]-o[a]);

  let md='# 工数分析 '+mk+'\n\n';
  md+='- 対象期間: '+mk+'\n- 記録件数: '+list.length+'件\n- 合計工数: '+hhmm(total)+'（'+Math.round(total/60000)+'分）\n\n';

  md+='## 価値区分別（バリューアワー）\n\n';
  md+='| 価値区分 | 工数 | 構成比 |\n|---|--:|--:|\n';
  ['add','keep','waste'].forEach(v=>{ md+='| '+VLABEL[v]+' | '+hhmm(byV[v])+' | '+pct(byV[v])+'% |\n'; });
  md+='\n**VH率（付加価値の割合）: '+pct(byV.add)+'%**\n\n';

  md+='## プロジェクト別\n\n| PJ | 工数 | 構成比 |\n|---|--:|--:|\n';
  sortDesc(byPj).forEach(p=>{ md+='| '+p+' | '+hhmm(byPj[p])+' | '+pct(byPj[p])+'% |\n'; });

  md+='\n## 業務分類別\n\n| 分類 | 価値区分 | 工数 | 構成比 |\n|---|---|--:|--:|\n';
  sortDesc(byCat).forEach(c=>{ md+='| '+c+' | '+VLABEL[catOf(c).v]+' | '+hhmm(byCat[c])+' | '+pct(byCat[c])+'% |\n'; });

  md+='\n---\n_工数タイムレコーダー ver.1.6.0 より出力_\n';
  downloadBlob(new Blob([md],{type:'text/markdown;charset=utf-8'}),'kosu_analysis_'+mk+'.md');
  toast(mk+' の分析Markdownを書き出しました');
}

function monthOpen(){
  // 記録のある月の一覧
  const months=[...new Set(S.entries.map(e=>monthKey(e.start)))].sort().reverse();
  const cur=monthKey(Date.now());
  if(!months.includes(cur)) months.unshift(cur);
  const mk=S._selMonth&&months.includes(S._selMonth)?S._selMonth:months[0];
  S._selMonth=mk;

  const list=monthlyEntries(mk);
  const total=list.reduce((s,e)=>s+(e.end-e.start),0);
  const byV={add:0,keep:0,waste:0},byPj={};
  list.forEach(e=>{const ms=e.end-e.start,c=catOf(e.cat);byV[c.v]+=ms;byPj[e.pj]=(byPj[e.pj]||0)+ms;});
  const pct=ms=>total>0?Math.round(ms/total*100):0;

  let h='<h3>月次分析・出力</h3>';
  h+='<select id="mSel" onchange="selMonth(this.value)">'+
     months.map(m=>'<option value="'+m+'"'+(m===mk?' selected':'')+'>'+m+'</option>').join('')+'</select>';

  if(list.length===0){
    h+='<div class="note">この月の記録はまだありません。</div>';
  }else{
    h+='<div class="sum" style="margin-bottom:10px">'+
       cell('合計',hhmm(total))+cell('付加価値',hhmm(byV.add))+
       cell('維持管理',hhmm(byV.keep))+cell('ムダ',hhmm(byV.waste))+
       cell('VH率',pct(byV.add)+'%')+'</div>';
    // PJ別 簡易バー
    h+='<h2 style="margin-top:14px">PJ別</h2>';
    Object.keys(byPj).sort((a,b)=>byPj[b]-byPj[a]).forEach(p=>{
      h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">'+
         '<span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p)+'</span>'+
         '<span style="color:var(--mute);font-family:var(--mono);flex:0 0 auto;margin-left:8px">'+hhmm(byPj[p])+' ・'+pct(byPj[p])+'%</span></div>'+
         '<div style="height:6px;background:var(--panel);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct(byPj[p])+'%;background:var(--amber)"></div></div></div>';
    });
    h+='<div class="note">記録件数 '+list.length+'件。「何にどれだけ時間を使ったか」を PJ別・価値区分別で見られます。</div>';
  }

  h+='<div class="row2" style="margin-top:8px"><button class="mini pri" onclick="exportCsv(\''+mk+'\')">CSV出力</button>'+
     '<button class="mini pri" onclick="exportMd(\''+mk+'\')">分析Markdown出力</button></div>';
  h+='<button class="closebtn done" onclick="closeSheet()">閉じる</button>';
  openSheet(h);
}
function selMonth(m){S._selMonth=m;monthOpen();}
document.getElementById('monthBtn').onclick=monthOpen;

/* ═══════ 設定 ═══════ */
document.getElementById('cfgBtn').onclick=cfgOpen;
function cfgOpen(){
  let h='<h3>設定</h3>';

  h+='<h2 style="margin-top:4px">ストップ忘れ防止</h2>';
  h+='<div class="note">計測がこの時間を超えると、警告を表示します（ストップ忘れ対策）。</div>';
  h+='<select id="alertSel" onchange="setAlert(this.value)">'+
     [30,45,60,90,120,180].map(v=>'<option value="'+v+'"'+(S.alertMin===v?' selected':'')+'>'+v+'分</option>').join('')+
     '</select>';

  h+='<h2>PJ一覧</h2>';
  S.projects.forEach((p,i)=>{
    h+='<div class="listrow"><span class="nm">'+esc(p)+'</span>'+
       '<button class="mini dan" onclick="delPj('+i+')">削除</button></div>';
  });
  h+='<div class="row2"><input type="text" id="newPj" placeholder="PJ名を追加"><button class="mini pri" onclick="addPj()">追加</button></div>';

  h+='<h2>業務分類</h2>';
  S.cats.forEach((c,i)=>{
    h+='<div class="listrow"><span class="nm">'+esc(c.n)+'</span>'+
       '<select onchange="setV('+i+',this.value)" style="width:auto;margin:0;padding:6px 8px;font-size:12px">'+
       ['add','keep','waste'].map(v=>'<option value="'+v+'"'+(c.v===v?' selected':'')+'>'+VLABEL[v]+'</option>').join('')+
       '</select><button class="mini dan" onclick="delCat('+i+')">削除</button></div>';
  });
  h+='<div class="row2"><input type="text" id="newCat" placeholder="業務分類を追加"><button class="mini pri" onclick="addCat()">追加</button></div>';

  h+='<div class="note">価値区分は分類ごとに固定されるため、打刻時の入力は不要です。付加価値時間の比率（VH率）が自動集計されます。</div>';
  h+='<button class="closebtn done" onclick="closeSheet()">閉じる</button>';
  openSheet(h);
}
function setAlert(v){S.alertMin=parseInt(v,10)||60;_alerted=false;save();render();}
function addPj(){const v=document.getElementById('newPj').value.trim();if(!v)return;S.projects.push(v);save();cfgOpen();render();}function delPj(i){if(S.projects.length<=1)return;S.projects.splice(i,1);save();cfgOpen();render();}
function addCat(){const v=document.getElementById('newCat').value.trim();if(!v)return;S.cats.push({n:v,v:'keep'});save();cfgOpen();render();}
function delCat(i){if(S.cats.length<=1)return;S.cats.splice(i,1);save();cfgOpen();render();}
function setV(i,v){S.cats[i].v=v;save();cfgOpen();render();}

render();
</script>
</body>
</html>
